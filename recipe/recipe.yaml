context:
  version: "6.11.0"
  maj_min: ${{ (version | split('.'))[:2] | join('.') }}

package:
  name: qt6-3d
  version: ${{ version }}

source:
  url: https://download.qt.io/official_releases/qt/${{ maj_min }}/${{ version }}/submodules/qt3d-everywhere-src-${{ version }}.tar.xz
  md5: c269ed568bc2faa4493b09821c5c82e9
  patches:
    # qt tries to run assimp and fails on win32 although assimp is found 
    - patches/0033-qt3d-disable-assimp-compile-test.patch

build:
  number: 1

requirements:
  build:
    - cmake
    - ninja
    - perl
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - if: build_platform != target_platform
      then: qt6-main ${{ version }}.*
  host:
    - qt6-main ${{ version }}.*
    - assimp
    - libzlib
    - if: linux
      then:
        - libgl-devel
        - libegl-devel
        - libopengl-devel
    - if: not osx
      then:
        - libvulkan-headers
        - libvulkan-loader
  run:
    - qt6-main ${{ version }}.*
  run_exports:
    - ${{ pin_subpackage('qt6-3d', upper_bound='x.x') }}

tests:
  - script:
      - if: unix
        then:
          - test -d $PREFIX/include/qt6/Qt3DAnimation
          - test -d $PREFIX/include/qt6/Qt3DCore
          - test -d $PREFIX/include/qt6/Qt3DExtras
          - test -d $PREFIX/include/qt6/Qt3DLogic
          - test -d $PREFIX/include/qt6/Qt3DRender
          - test -f $PREFIX/lib/libQt63DAnimation${SHLIB_EXT}
        else:
          - if not exist %PREFIX%\\Library\\include\\qt6\\Qt3DAnimation exit 1
          - if not exist %PREFIX%\\Library\\lib\\Qt63DAnimation.lib exit 1
          - if not exist %PREFIX%\\Library\\bin\\Qt63DAnimation.dll exit 1

about:
  homepage: http://qt-project.org
  license: LGPL-3.0-only
  license_file: LICENSES/LGPL-3.0-only.txt
  summary: Qt is a cross-platform application and UI framework.
  description: |
    Qt helps you create connected devices, UIs & applications that run
    anywhere on any device, on any operating system at any time.
  documentation: http://doc.qt.io/
  repository: https://github.com/qt/qt3d

extra:
  recipe-maintainers:
    - jschueller
  feedstock-name: qt-3d
